name: Update Research Feed

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Days to look back (overrides watchlist default)'
        required: false
        default: ''
      max_new:
        description: 'Max new entries to add per run'
        required: false
        default: '12'

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts/research-feed
        run: npm install

      - name: Run research feed updater
        working-directory: scripts/research-feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          MAX_NEW_PER_RUN: ${{ github.event.inputs.max_new || '12' }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '' }}
        run: node fetch.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/research-feed.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Open PR if feed changed
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="research-feed/${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/research-feed.json
          git commit -m "Research feed update — ${DATE}"
          git push origin "$BRANCH"
          gh pr create \
            --title "Research feed update — ${DATE}" \
            --body "$(cat <<'EOF'
## Weekly research feed update

Auto-fetched from PubMed, medRxiv/bioRxiv, and ClinicalTrials.gov.

**Review checklist before merging:**
- [ ] Headlines are plain-English and accurate
- [ ] No duplicates or near-duplicates of existing entries
- [ ] Summaries and key findings are factually correct
- [ ] Limitations and context are honest
- [ ] No entries that are clearly out of scope

This PR was opened automatically — human review is required before merging.
EOF
)" \
            --base main \
            --head "$BRANCH"
