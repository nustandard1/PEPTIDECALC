name: Update Research Feed

on:
  push:
    branches: [main]
    paths: ['.github/workflows/research-feed.yml']
  schedule:
    # Every Sunday at 07:00 UTC
    - cron: '0 7 * * 0'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Days to look back (overrides watchlist default)'
        required: false
        default: ''
      max_new:
        description: 'Max new entries to add per run'
        required: false
        default: '12'

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts/research-feed
        run: npm install

      - name: Run research feed updater
        working-directory: scripts/research-feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          MODEL: claude-sonnet-4-6
          MAX_NEW_PER_RUN: ${{ github.event.inputs.max_new || '12' }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '' }}
        run: node fetch.mjs

      - name: Commit updated feed to main
        run: |
          git diff --quiet data/research-feed.json && echo "No new entries, skipping commit." && exit 0
          DATE=$(date -u +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/research-feed.json
          git commit -m "Research feed update — ${DATE}"
          git push origin main
